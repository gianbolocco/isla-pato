<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vacaciones en Isla Pato</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1116; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* Cartel de "click para jugar" cuando el puntero no está capturado */
      #overlay {
        position: fixed; inset: 0; display: grid; place-content: center;
        gap: 12px; text-align: center; cursor: pointer;
        background: radial-gradient(120% 120% at 50% 25%, rgba(24,54,62,.45), rgba(6,14,18,.9));
        color: #f1e4bd; font-family: Georgia, "Times New Roman", serif;
        transition: opacity .25s ease;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay .mark { width: 84px; height: 84px; filter: drop-shadow(0 8px 18px rgba(0,0,0,.5)); }
      #overlay p { opacity: .85; font-size: clamp(15px, 2vw, 19px); letter-spacing: .5px; }
      #overlay .keys { margin-top: 8px; opacity: .7; font-size: 13px; color: #cfe0dd; font-family: system-ui, sans-serif; }
      kbd {
        display: inline-block; padding: 2px 8px; margin: 0 2px; border-radius: 6px;
        background: #e7c8771a; border: 1px solid #e7c87744; font-family: inherit; font-size: 13px;
      }

      /* HUD mínimo */
      #hud {
        position: fixed; top: 12px; left: 12px; color: #f5f2eccc;
        font-family: system-ui, sans-serif; font-size: 13px; line-height: 1.5;
        text-shadow: 0 1px 3px #000a; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud"></div>

    <!-- Pantalla de "click para jugar" (captura el mouse). Arranca oculta: primero va el
         menú + intro (src/ui/StartScreen.js); esto reaparece al soltar el mouse con Esc. -->
    <div id="overlay" class="hidden">
      <img class="mark" src="/favicon.svg" alt="Isla Pato" />
      <p>Click para volver a la aventura</p>
      <p class="keys">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> moverse ·
        <kbd>Espacio</kbd> saltar · <kbd>Shift</kbd> correr · <kbd>Mouse</kbd> mirar ·
        <kbd>E</kbd> interactuar
      </p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

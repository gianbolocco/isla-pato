<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vacaciones en Isla Pato 🏝️🦆</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1116; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* Cartel de "click para jugar" cuando el puntero no está capturado */
      #overlay {
        position: fixed; inset: 0; display: grid; place-content: center;
        gap: 12px; text-align: center; cursor: pointer;
        background: radial-gradient(120% 120% at 50% 30%, rgba(20,26,36,.35), rgba(8,10,14,.85));
        color: #f5f2ec; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        transition: opacity .25s ease;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay h1 { font-size: clamp(28px, 5vw, 52px); font-weight: 800; letter-spacing: .5px; }
      #overlay p { opacity: .8; font-size: clamp(14px, 2vw, 18px); }
      #overlay .keys { margin-top: 8px; opacity: .7; font-size: 14px; }
      kbd {
        display: inline-block; padding: 2px 8px; margin: 0 2px; border-radius: 6px;
        background: #ffffff1a; border: 1px solid #ffffff33; font-family: inherit; font-size: 13px;
      }

      /* HUD mínimo */
      #hud {
        position: fixed; top: 12px; left: 12px; color: #f5f2eccc;
        font-family: system-ui, sans-serif; font-size: 13px; line-height: 1.5;
        text-shadow: 0 1px 3px #000a; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud"></div>

    <div id="overlay">
      <h1>Vacaciones en Isla Pato 🏝️🦆</h1>
      <p>Click para empezar la aventura</p>
      <p class="keys">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> moverse ·
        <kbd>Espacio</kbd> saltar · <kbd>Shift</kbd> correr · <kbd>Mouse</kbd> mirar
      </p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
